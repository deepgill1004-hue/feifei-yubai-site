name: Sync beehiiv draft

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "beehiiv/**"

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check beehiiv secrets
        run: |
          test -n "$BEEHIIV_API_KEY"
          test -n "$BEEHIIV_PUBLICATION_ID"
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}

      - name: Create beehiiv draft
        run: node scripts/create-beehiiv-drafts.mjs
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          BEEHIIV_POST_TEMPLATE_ID: ${{ secrets.BEEHIIV_POST_TEMPLATE_ID }}
